<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #2b2e3c;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 30px 0;
            font-family: 'Times New Roman', Times, serif;
        }
        .page-container {
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            border-radius: 4px;
            background-color: white;
            background-repeat: no-repeat;
        }
        .page-container.blurred-layout {
            filter: blur(5px);
            pointer-events: none;
        }
        .line-div {
            position: absolute;
            background-color: transparent;
            white-space: nowrap;
            overflow: visible;
            display: flex;
            align-items: center;
        }
        .glass-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            padding: 30px 50px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.25);
            animation: fadeIn 0.3s ease-out;
        }
        .glass-card h3 { color: #1e293b; margin-bottom: 8px; font-size: 20px; font-weight: 700; }
        .glass-card p  { color: #64748b; font-size: 14px; }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.97); }
            to   { opacity: 1; transform: scale(1); }
        }

    /* ── ANIMATIONS DU SQUELETTE ET DE L'APPARITION DU TEXTE ── */
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        
        .skeleton-line {
            display: inline-block;
            width: 100%;
            height: 10px;
            background: linear-gradient(90deg, #f1f5f9 25%, #cbd5e1 50%, #f1f5f9 75%);
            background-size: 200% 100%;
            animation: shimmer 1.8s infinite linear;
            border-radius: 4px;
        }
        
        .fade-in {
            animation: fadeInEffect 0.5s ease-out forwards;
        }
        
        @keyframes fadeInEffect {
            from { opacity: 0; transform: translateY(1px); }
            to   { opacity: 1; transform: translateY(0); }
        }

       
        @font-face {
            font-family: 'EB Garamond';
            src: url('file:///D:/Projets/RockTranslate/src/assets/fonts/EBGaramond-Regular.ttf');
            font-weight: normal; font-style: normal;
        }
        @font-face {
            font-family: 'EB Garamond';
            src: url('file:///D:/Projets/RockTranslate/src/assets/fonts/EBGaramond-Bold.ttf');
            font-weight: bold; font-style: normal;
        }
        @font-face {
            font-family: 'EB Garamond';
            src: url('file:///D:/Projets/RockTranslate/src/assets/fonts/EBGaramond-Italic.ttf');
            font-weight: normal; font-style: italic;
        }
        @font-face {
            font-family: 'EB Garamond';
            src: url('file:///D:/Projets/RockTranslate/src/assets/fonts/EBGaramond-BoldItalic.ttf');
            font-weight: bold; font-style: italic;
        }

    </style>

    <script>
        // Surgical block injection — called by TranslationViewer after each translated line
        function updateBlock(pageIdx, blockId, lineId, blockHtml) {
            var el = document.getElementById("line-" + pageIdx + "-" + blockId + "-" + lineId);
            if (el) {
                el.outerHTML = blockHtml;
            } else {
                var container = document.getElementById("page-container-" + pageIdx);
                if (container) {
                    container.insertAdjacentHTML('beforeend', blockHtml);
                }
            }
        }
    </script>
