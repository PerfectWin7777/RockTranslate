<!--
  RockTranslate — API Configuration Dialog Modal
  Path: src/rocktranslate/assets/ui/components/api_config_modal.html
-->

<div id="api-config-modal-overlay" class="modal-overlay" x-data="apiConfigController()"
    x-show="$store.modals.active === 'api_config'" x-transition x-cloak>
    <div class="modal-card" style="width: 620px;" @click.away="$store.modals.close()">

        <!-- ── Header ── -->
        <div class="modal-header">
            <div class="modal-title-block">
                <h2 x-text="$store.i18n.translate('item_api_config')"></h2>
            </div>
        </div>

        <!-- ── Body ── -->
        <div class="modal-body">

            <!-- Loading spinner (shown while Python serves config data) -->
            <div x-show="loading"
                style="display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px 0; width: 100%;">
                <div class="circular-loader"
                    style="border-top-color: var(--accent-blue); width: 32px; height: 32px; margin: 0;"></div>
            </div>

            <!-- Main form (rendered only once data is fully loaded) -->
            <template x-if="!loading && Object.keys(isolatedConfigs).length > 0">
                <div class="settings-form" style="display: flex; flex-direction: column; gap: 20px;">

                    <!-- Provider dropdown -->
                    <div style="display: flex; flex-direction: column; gap: 6px;">
                        <label class="form-label" x-text="$store.i18n.translate('api_config_provider_lbl')"></label>
                        <select x-model="currentProvider"
                            style="width: 100%; height: 36px; padding: 0 10px; border: 1px solid var(--border-color); border-radius: 4px; font-size: 12px; outline: none; background: white; color: var(--text-primary);"
                            @change="showSuccessLabel = false">
                            <template x-for="provider in Object.keys(providersConfig)" :key="provider">
                                <option :value="provider" :selected="currentProvider === provider" x-text="provider">
                                </option>
                            </template>
                        </select>
                    </div>

                    <!-- API key (hidden for Ollama local) -->
                    <div x-show="currentProvider !== 'Ollama (Local)'"
                        style="display: flex; flex-direction: column; gap: 6px;">

                        <!-- Label row: key label on the left, help link on the right -->
                        <div style="display: flex; align-items: center; justify-content: space-between;">
                            <label class="form-label" x-text="$store.i18n.translate('lbl_key')"></label>
                            <a href="#"
                                x-show="providersConfig[currentProvider] && providersConfig[currentProvider].key_url"
                                x-text="$store.i18n.translate('get_api_key')"
                                @click.prevent="providersConfig[currentProvider] && window.pywebview.api.open_external_link(providersConfig[currentProvider].key_url)"
                                style="font-size: 11px; color: var(--accent-blue); text-decoration: none; font-weight: 600;"
                                @mouseenter="$el.style.textDecoration='underline'"
                                @mouseleave="$el.style.textDecoration='none'">
                            </a>
                        </div>

                        <!-- Key input + Delete button on the same row -->
                        <div style="display: flex; gap: 8px; align-items: center;">
                            <input type="password" x-model="isolatedConfigs[currentProvider].api_key"
                                placeholder="Paste your API key here…"
                                style="flex: 1; height: 36px; padding: 0 12px; border: 1px solid var(--border-color); border-radius: 4px; font-size: 12px; outline: none; background: white; color: var(--text-primary);">
                            <button type="button" class="btn-browse"
                                style="height: 36px; padding: 0 14px; font-size: 12px; font-weight: 500; border: 1px solid #feb2b2; border-radius: 4px; background: #fff5f5; color: var(--accent-red); cursor: pointer; white-space: nowrap; display: flex; align-items: center; gap: 6px;"
                                @click="deleteKey()">
                                <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round" aria-hidden="true">
                                    <polyline points="3 6 5 6 21 6"></polyline>
                                    <path d="M19 6l-1 14H6L5 6"></path>
                                    <path d="M10 11v6"></path>
                                    <path d="M14 11v6"></path>
                                    <path d="M9 6V4h6v2"></path>
                                </svg>
                                Delete
                            </button>
                        </div>

                        <!-- Delete success feedback (inline, right below the field) -->
                        <div x-show="showSuccessLabel" style="display: flex; align-items: center; gap: 5px;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                                stroke-linejoin="round" style="color: var(--accent-green);" aria-hidden="true">
                                <polyline points="20 6 9 17 4 12"></polyline>
                            </svg>
                            <span style="font-size: 11px; font-weight: 600; color: var(--accent-green);">
                                API key deleted successfully.
                            </span>
                        </div>
                    </div>

                    <!-- Custom base URL toggle (hidden for Ollama) -->
                    <div x-show="currentProvider !== 'Ollama (Local)'"
                        style="display: flex; align-items: center; gap: 8px;">
                        <input type="checkbox" id="chk-api-custom-base"
                            x-model="isolatedConfigs[currentProvider].use_custom_base">
                        <label for="chk-api-custom-base"
                            style="font-size: 11px; cursor: pointer; user-select: none; color: var(--text-primary);"
                            x-text="$store.i18n.translate('chk_custom_base')"></label>
                    </div>

                    <!-- Base URL field (always visible for Ollama, conditional otherwise) -->
                    <div x-show="currentProvider === 'Ollama (Local)' || isolatedConfigs[currentProvider].use_custom_base"
                        style="display: flex; flex-direction: column; gap: 6px;">
                        <label class="form-label" x-text="$store.i18n.translate('system_pdf2html_lbl_url')"></label>
                        <input type="text" x-model="isolatedConfigs[currentProvider].custom_base_url"
                            placeholder="http://localhost:11434"
                            style="width: 100%; height: 36px; padding: 0 12px; border: 1px solid var(--border-color); border-radius: 4px; font-size: 12px; outline: none; background: white; color: var(--text-primary); box-sizing: border-box;">
                    </div>

                    <!-- Model selector -->
                    <div style="display: flex; flex-direction: column; gap: 6px;">
                        <label class="form-label" x-text="$store.i18n.translate('system_model_lbl')"></label>
                        <!-- :key="index" prevents duplicate-key issues when model lists overlap -->
                        <select x-model="isolatedConfigs[currentProvider].last_model"
                            style="width: 100%; height: 36px; padding: 0 10px; border: 1px solid var(--border-color); border-radius: 4px; font-size: 12px; outline: none; background: white; color: var(--text-primary);">
                            <template x-for="(model, index) in getSuggestedModels()" :key="index">
                                <option :value="model"
                                    :selected="isolatedConfigs[currentProvider] && isolatedConfigs[currentProvider].last_model === model"
                                    x-text="model"></option>
                            </template>
                        </select>
                    </div>

                    <!-- OpenRouter free-tier warning banner -->
                    <div x-show="currentProvider === 'OpenRouter' && isolatedConfigs['OpenRouter'] && isolatedConfigs['OpenRouter'].last_model && isolatedConfigs['OpenRouter'].last_model.indexOf('free') !== -1"
                        class="warning-banner" x-cloak>
                        <span class="warning-icon">⚠️</span>
                        <span class="warning-text" x-text="$store.i18n.translate('openrouter_free_warning')"></span>
                    </div>

                </div>
            </template>
        </div>

        <!-- Disclosure notice -->
        <div class="modal-body" style="padding-top: 0;">
            <p style="font-size: 11px; color: var(--text-muted); margin: 0; padding-top: 10px; line-height: 1.6;"
                x-text="$store.i18n.translate('api_info_disclosure')"></p>
        </div>

        <!-- ── Footer actions ── -->
        <div class="modal-actions" style="gap: 10px;">
            <button class="modal-btn-close" @click="$store.modals.close()"
                x-text="$store.i18n.translate('cancel_btn')"></button>
            <button class="modal-btn-close" x-show="!loading" @click="save()"
                style="background-color: var(--accent-blue); color: white; border-color: var(--accent-blue);"
                x-text="$store.i18n.translate('save_btn')"></button>
        </div>

    </div>
</div>
